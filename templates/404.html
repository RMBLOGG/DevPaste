{% extends "base.html" %}

{% block title %}404 — DevPaste{% endblock %}

{% block content %}
<div class="error-page">
  <div class="error-code">404</div>
  <div class="error-title">{{ message or 'Paste Tidak Ditemukan' }}</div>
  <div class="error-sub">// Paste ini tidak ada atau sudah kedaluwarsa</div>
  <div style="margin-top:28px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
    <a href="{{ url_for('main.index') }}" class="btn-primary" style="padding:10px 20px;">
      <i class="bi bi-plus-square me-2"></i>Buat Paste Baru
    </a>
    <a href="{{ url_for('main.explore') }}" class="btn-secondary" style="padding:10px 20px;">
      <i class="bi bi-compass me-2"></i>Jelajahi
    </a>
  </div>
</div>
{% endblock %}
